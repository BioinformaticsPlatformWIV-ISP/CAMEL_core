stages:
  - info
  - write_test

show_system_info:
  stage: info
  script:
    - echo "Checking the user running this job:"
    - whoami
    - echo "Checking the Shell version:"
    - $SHELL --version || echo "Using default shell"
    - echo "Current directory path:"
    - pwd

test_file_permissions:
  stage: write_test
  script:
    - echo "Testing if I can write a file to the build directory..."
    - echo "Success" > shell_test.log
    - cat shell_test.log
  artifacts:
    paths:
      - shell_test.log